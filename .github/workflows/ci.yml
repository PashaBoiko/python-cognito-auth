name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff lint
        run: poetry run ruff check src/

      - name: Ruff format check
        run: poetry run ruff format --check src/

      - name: Mypy type check
        run: poetry run mypy src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_auth
          JWT_SECRET: test-secret-for-ci
          COGNITO_USER_POOL_ID: test
          COGNITO_CLIENT_ID: test
          COGNITO_REGION: us-east-1
          COGNITO_URL: https://test.auth.us-east-1.amazoncognito.com
          COGNITO_CLIENT_SECRET: test
          COGNITO_LOGIN_REDIRECT_URL: http://localhost:3000/callback
          ALLOWED_ORIGINS: '["http://localhost:3000"]'
        run: poetry run pytest -v
